      gamer: STRONG
      playful: WEAK
  - label: A world of books and knowledge
    i18n:
      ja:
        label: 本と知識の世界
    weights:
      reading: STRONG
      intellectual: WEAK
  - label: Playing music
    i18n:
      ja:
        label: 音楽を奏でる
    weights:
      music: STRONG
      mysterious: WEAK
  - label: Working up a sweat in sports
    i18n:
      ja:
