# hersona 診断クイズ v2 草案 (decision tree, 2 択 × 9 問)
#
# 設計:
# - ルート Q1 で「静か / 賑やか」分岐
# - 各選択肢に `next: <id>` で次質問を指定
# - 2 択を徹底 (質問ごとの認知負荷を下げる)
# - 9 問で 64 属性のスコアを満遍なく加算
# - 終端質問 (9 問目) は next 省略
# - 拡張: データ追加のみ、Python コード修正不要
#
# 注意 (ROADMAP/W2 統合済前提):
# - 全 weight キーは既存属性 (m.names() に含まれる) であること
# - WeightMagnitude 名前 (STRONG=2.5 / MODERATE=2.0 / MILD=1.5 / WEAK=1.0) を使う
# - i18n は BASE=en キー、ja 翻訳を i18n.ja に格納
# - 質問 ID は CLI/--answers のキー。改名禁止
# - load_quiz 側で `next` バリデーション:
#     重複 ID、未定義 next_id、サイクル → ValueError
#
# 構成:
# - Q1 (ルート・2択) → Q2 (4 系統)
# - Q3 (8 系統) → Q4 (2 系統、合流)
# - Q4 → Q5 → Q6 → Q7 → Q8 → Q9 (2 系統リニア、合流 → 終端)
# - 全 9 問 × 2 択 = 18 経路ノード、64 属性を網羅

version: "0.2.0"
description: "Decision tree quiz, 2-choice × 9 questions (full coverage)"

questions:
  # ***REMOVED-BASE64***
  # Q1: ルート (全員に通る)
  # ***REMOVED-BASE64***
  - id: q1
    prompt: "What kind of person do you prefer?"
    i18n: {ja: {prompt: "どんな人がいい？"}}
    options:
      - label: "Quiet and reserved"
        i18n: {ja: {label: "静かな人"}}
        weights: {dandere: STRONG, kuudere: MILD}
        next: q2_quiet
      - label: "Lively and bright"
        i18n: {ja: {label: "賑やかな人"}}
        weights: {genki: STRONG, playful: MILD}
        next: q2_lively

  # ***REMOVED-BASE64***
  # Q2: ルート分岐
  # ***REMOVED-BASE64***
  # 静かルート: 距離感のとり方
  - id: q2_quiet
    prompt: "How does she keep her distance?"
    i18n: {ja: {prompt: "距離感は？"}}
    options:
      - label: "A polite, dignified line"
        i18n: {ja: {label: "一線を保つ、品よく"}}
        weights: {keigo: MODERATE, onee_kotoba: WEAK, mentor: WEAK}
        next: q3_quiet_a
      - label: "Swallows feelings, deep and heavy"
        i18n: {ja: {label: "内に秘めて、深く重い"}}
        weights: {yandere: MODERATE, pessimist: MILD, dandere: WEAK}
        next: q3_quiet_b

  # 賑やかルート: 場の明るさ
  - id: q2_lively
    prompt: "How does she light up the room?"
    i18n: {ja: {prompt: "場の明るさは？"}}
    options:
      - label: "Bright and uplifting"
        i18n: {ja: {label: "場を明るく引っ張る"}}
        weights: {genki: MODERATE, playful: MILD}
        next: q3_lively_a
      - label: "Teases to provoke a reaction"
        i18n: {ja: {label: "挑発して反応をもらう"}}
        weights: {mischievous: MODERATE, tsundere: MILD}
        next: q3_lively_b

  # ***REMOVED-BASE64***
  # Q3: Q2 各系統から 2 系統 (合計 4 系統)
  # ***REMOVED-BASE64***
  - id: q3_quiet_a
    prompt: "What speech fits her?"
    i18n: {ja: {prompt: "話し方は？"}}
    options:
      - label: "Archaic and solemn"
        i18n: {ja: {label: "古風・荘厳"}}
        weights: {archaic: STRONG, shrine_maiden: WEAK}
        next: q4
      - label: "Quiet, polite, gentle"
        i18n: {ja: {label: "静かで、丁寧、優しい"}}
        weights: {keigo: MODERATE, soft: WEAK, dandere: WEAK}
        next: q4

  - id: q3_quiet_b
    prompt: "How does she act when she opens up?"
    i18n: {ja: {prompt: "心を許した時どうする？"}}
    options:
      - label: "Quietly watches over you"
        i18n: {ja: {label: "静かに見守る"}}
        weights: {dandere: STRONG, stoic: WEAK}
        next: q4
      - label: "Stands by your side with clumsy devotion"
        i18n: {ja: {label: "不器用ながらもそばにいる"}}
        weights: {protective: STRONG, klutz: WEAK, cooking: WEAK}
        next: q4

  - id: q3_lively_a
    prompt: "What speech fits her?"
    i18n: {ja: {prompt: "話し方は？"}}
    options:
      - label: "Sweet, soft, friendly"
        i18n: {ja: {label: "甘く、柔らかく、親しみやすい"}}
        weights: {soft: STRONG, gyaru: WEAK}
        next: q4
      - label: "Tomboyish and blunt"
        i18n: {ja: {label: "男勝りでさっぱり"}}
        weights: {tomboy: STRONG, ore_boy: WEAK, boku_girl: WEAK}
        next: q4

  - id: q3_lively_b
    prompt: "How does she pick on you?"
    i18n: {ja: {prompt: "からかいのスタイルは？"}}
    options:
      - label: "Playful, lightens the mood"
        i18n: {ja: {label: "ふざけて場を和ませる"}}
        weights: {playful: STRONG, genki: WEAK}
        next: q4
      - label: "Standoffish but secretly caring"
        i18n: {ja: {label: "素っ気ないが本当は気になっている"}}
        weights: {tsundere: STRONG, blunt: WEAK}
        next: q4

  # ***REMOVED-BASE64***
  # Q4〜Q9: 共通集大成セクション (Q4 合流 → Q5〜Q9 リニア)
  # ***REMOVED-BASE64***
  - id: q4
    prompt: "What is her role in the story?"
    i18n: {ja: {prompt: "物語での役割は？"}}
    options:
      - label: "A guiding mentor"
        i18n: {ja: {label: "導く先達"}}
        weights: {mentor: STRONG, serious: WEAK}
        next: q5
      - label: "A clashing rival"
        i18n: {ja: {label: "ぶつかり合うライバル"}}
        weights: {rival: STRONG, tsundere: WEAK}
        next: q5

  # ***REMOVED-BASE64***
  # Q5: 趣味・ライフスタイル軸 (hobby / archetype 補強)
  # ***REMOVED-BASE64***
  - id: q5
    prompt: "How does she spend her free time?"
    i18n: {ja: {prompt: "余暇の過ごし方は？"}}
    options:
      - label: "Buried in a book, quietly"
        i18n: {ja: {label: "本に埋もれて静かに"}}
        weights: {reading: STRONG, intellectual: MODERATE, glasses: WEAK}
        next: q6
      - label: "Out on the field, sweating"
        i18n: {ja: {label: "外で汗を流して"}}
        weights: {sports: STRONG, genki: WEAK, hot_blooded: WEAK}
        next: q6

  # ***REMOVED-BASE64***
  # Q6: 文化的背景 / 暮らし (cultural + speech 残)
  # ***REMOVED-BASE64***
  - id: q6
    prompt: "Where does she feel most at home?"
    i18n: {ja: {prompt: "どんな土地柄が似合う？"}}
    options:
      - label: "Old capital, soft dialect"
        i18n: {ja: {label: "古都、柔らかな方言"}}
        weights: {kyoto_ben: STRONG, shrine_maiden: WEAK, mysterious: WEAK}
        next: q7
      - label: "Vibrant city, urban pace"
        i18n: {ja: {label: "華やか都市、都会のテンポ"}}
        weights: {kansai_ben: MODERATE, idol: MODERATE, glamorous: WEAK}
        next: q7

  # ***REMOVED-BASE64***
  # Q7: 残 personality 軸 (airhead / intellectual / mysterious 等)
  # ***REMOVED-BASE64***
  - id: q7
    prompt: "How does her mind work?"
    i18n: {ja: {prompt: "頭の回転は？"}}
    options:
      - label: "Blank and dreamy, head in the clouds"
        i18n: {ja: {label: "ぽやーっと、夢見がち"}}
        weights: {airhead: STRONG, optimist: WEAK}
        next: q8
      - label: "Always three steps ahead"
        i18n: {ja: {label: "いつも三手先を読む"}}
        weights: {intellectual: STRONG, mysterious: MODERATE, glasses: WEAK}
        next: q8

  # ***REMOVED-BASE64***
  # Q8: archetype 補強 (heroine / childhood_friend)
  # ***REMOVED-BASE64***
  - id: q8
    prompt: "How does she fit into your world?"
    i18n: {ja: {prompt: "あなたとの距離感は？"}}
    options:
      - label: "Childhood friend, always nearby"
        i18n: {ja: {label: "幼馴染、いつもそば"}}
        weights: {childhood_friend: STRONG, optimist: WEAK}
        next: q9
      - label: "Just met, but unforgettable"
        i18n: {ja: {label: "つい最近出会った、でも忘れられない"}}
        weights: {heroine: STRONG, mysterious: WEAK}
        next: q9

  # ***REMOVED-BASE64***
  # Q9: 最終クロス軸 (speech 残: washi / archaic / whispery)
  # ***REMOVED-BASE64***
  - id: q9
    prompt: "Pick the line she would actually say."
    i18n: {ja: {prompt: "彼女が言いそうな台詞は？"}}
    options:
      - label: "\"It is I who should apologize...\""
        i18n: {ja: {label: "「わしが謝るべきであった……」"}}
        weights: {washi: STRONG, archaic: MODERATE, mysterious: WEAK}
        # next 省略 = 終端 (Q9 は最終質問)
      - label: "\"...You didn't hear that.\""
        i18n: {ja: {label: "「……今の、聞かなかったことにして」"}}
        weights: {whispery: STRONG, tsundere: WEAK, mysterious: WEAK}
