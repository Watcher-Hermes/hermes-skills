# hersona 診断クイズ (recommend v1.2.0+)
#
# ROADMAP ② 評価・推薦システム用の既定クイズ。各回答は属性スコアに
# WeightMagnitude 値を加算する (recommend.py:WeightMagnitude を参照)。
#
# 設計方針:
# - 9 問構成 (旧 5 問 → visual / hobby / lifestyle / interaction / cultural 軸を追加)
# - 59 属性フル活用: personality 20 / speech 20 / archetype 9 / visual 5 / hobby 5
# - 拡張は本 YAML への追記のみ。Python コード修正不要 (= 拡張コスト最小化)
# - 全 weight は WeightMagnitude 値 (STRONG=2.5 / MODERATE=2.0 / MILD=1.5 / WEAK=1.0)
#   ※ 単一回答で 2 属性以上に重みを乗せる場合、片方を WEAK に下げて差別化
#
# i18n (Phase 3):
# - prompt / label は BASE=en。日本語は `i18n: {ja: {prompt|label: "..."}}` に格納。
# - 表示言語に応じて recommend.QuizQuestion.localized_prompt / QuizOption.localized_label
#   が解決する (フォールバック: <lang> → BASE)。
#
# 質問 ID の安定性 (= API):
# - 質問 ID は CLI/--answers のキー (例: --answers distance=1,appearance=2)
# - ID を消す/リネームすると既存スクリプトが壊れる。新設は OK
#
# 質問追加時のチェック:
# 1. 全 weight キーが既存属性 (m.names() に含まれる) であること
# 2. 同カテゴリ内の重複は最小化 (top-1 選択で衝突しない程度の散らし方が理想)
# 3. 5+ 個の選択肢 (推奨)、最低 2 個

version: "1.2.0"
description: "9-question quiz for hersona attribute recommendation (full use of 59 attributes)"

questions:
  # 1. 距離感 (personality 主導)
  - id: distance
    prompt: "How close does she get to you?"
    i18n: {ja: {prompt: "相手との距離感は？"}}
    options:
      - label: "Comes on strong and close"
        i18n: {ja: {label: "ぐいぐい近づいてくる"}}
        weights: {genki: MODERATE, childhood_friend: MILD, playful: WEAK}
      - label: "Standoffish but secretly cares"
        i18n: {ja: {label: "素っ気ないが本当は気になっている"}}
        weights: {tsundere: MODERATE, kuudere: WEAK}
      - label: "Quiet and reserved"
        i18n: {ja: {label: "物静かで控えめ"}}
        weights: {dandere: MODERATE, whispery: MILD, stoic: WEAK}
      - label: "Keeps a poised distance"
        i18n: {ja: {label: "一定の品を保つ"}}
        weights: {keigo: MODERATE, onee_kotoba: WEAK, mentor: WEAK}

  # 2. 感情の出し方 (personality 主導)
  - id: emotion
    prompt: "How does she express emotion?"
    i18n: {ja: {prompt: "感情の出し方は？"}}
    options:
      - label: "Expressive and lively"
        i18n: {ja: {label: "表情豊かでにぎやか"}}
        weights: {genki: MODERATE, playful: MILD}
      - label: "Cool and unshaken"
        i18n: {ja: {label: "クールで動じない"}}
        weights: {kuudere: MODERATE, stoic: MILD, mysterious: WEAK}
      - label: "Bottled up, deep and heavy"
        i18n: {ja: {label: "内に秘めて深く重い"}}
        weights: {yandere: MILD, pessimist: MILD, dandere: WEAK}
      - label: "Switches on and off by situation"
        i18n: {ja: {label: "状況でオンオフ切り替える"}}
        weights: {switch: MODERATE, serious: WEAK}
      - label: "Airheaded and at her own pace"
        i18n: {ja: {label: "天然でマイペース"}}
        weights: {airhead: MODERATE, klutz: WEAK}
      - label: "Believes she has special powers or a secret"
        i18n: {ja: {label: "特別な力や設定を信じている"}}
        weights: {chuunibyou: STRONG}
      - label: "Brimming with confidence in her charm"
        i18n: {ja: {label: "自分の魅力に自信たっぷり"}}
        weights: {narcissist: STRONG}
      - label: "Takes everything positively"
        i18n: {ja: {label: "何でも前向きに捉える"}}
        weights: {optimist: STRONG, genki: WEAK}

  # 3. 話し方 (speech 軸、選択肢を 20 種から散らす)
  - id: speech
    prompt: "What speech style do you prefer?"
    i18n: {ja: {prompt: "どんな話し方が好み？"}}
    options:
      - label: "Polite honorific speech"
        i18n: {ja: {label: "丁寧な敬語"}}
        weights: {keigo: STRONG}
      - label: "Boyish, casual speech"
        i18n: {ja: {label: "ボーイッシュなタメ口"}}
        weights: {boku_girl: MODERATE, ore_boy: MODERATE}
      - label: "Friendly, dialect-flavored"
        i18n: {ja: {label: "方言まじりで親しみやすい"}}
        weights: {kansai_ben: STRONG, genki: WEAK}
      - label: "Archaic and solemn"
        i18n: {ja: {label: "古風・荘厳"}}
        weights: {archaic: STRONG, shrine_maiden: WEAK}
      - label: "Aged, sagely manner of speaking"
        i18n: {ja: {label: "老成・含蓄ある語り"}}
        weights: {washi: STRONG, archaic: WEAK}
      - label: "Elegant, gentle Kyoto speech"
        i18n: {ja: {label: "はんなり上品な京言葉"}}
        weights: {kyoto_ben: STRONG, onee_kotoba: WEAK}
      - label: "Trendy gyaru youth slang"
        i18n: {ja: {label: "ギャル系の若者口調"}}
        weights: {gyaru: STRONG, genki: WEAK}
      - label: "Sweet and soft tone"
        i18n: {ja: {label: "甘く柔らかい口調"}}
        weights: {soft: STRONG, dandere: WEAK}
      - label: "Tomboyish and blunt"
        i18n: {ja: {label: "男勝りでさっぱり"}}
        weights: {tomboy: STRONG, ore_boy: WEAK}
      - label: "Refined, ladylike speech"
        i18n: {ja: {label: "お嬢様上品"}}
        weights: {princess_speech: STRONG, onee_kotoba: WEAK}
      - label: "Sultry, alluring tone"
        i18n: {ja: {label: "色気のある誘うような口調"}}
        weights: {seductive: STRONG}
      - label: "Nervous and stammering"
        i18n: {ja: {label: "緊張して言い淀みがち"}}
        weights: {stutter: STRONG, dandere: WEAK}
      - label: "Curt and few words"
        i18n: {ja: {label: "素っ気なく言葉数が少ない"}}
        weights: {blunt: STRONG, kuudere: WEAK}
      - label: "Grandiose and theatrical"
        i18n: {ja: {label: "大仰で芝居がかった"}}
        weights: {theatrical: STRONG}

  # 4. 物語での立ち位置 (archetype)
  - id: role
    prompt: "What is her role in the story?"
    i18n: {ja: {prompt: "物語での立ち位置は？"}}
    options:
      - label: "A guiding mentor"
        i18n: {ja: {label: "導く先達"}}
        weights: {mentor: STRONG, serious: WEAK}
      - label: "A clashing rival"
        i18n: {ja: {label: "ぶつかり合うライバル"}}
        weights: {rival: STRONG, tsundere: WEAK}
      - label: "A childhood friend by your side"
        i18n: {ja: {label: "そばにいる幼なじみ"}}
        weights: {childhood_friend: STRONG, genki: WEAK}
      - label: "The heroine"
        i18n: {ja: {label: "ヒロイン"}}
        weights: {heroine: STRONG}
      - label: "An idol everyone roots for"
        i18n: {ja: {label: "応援されるアイドル"}}
        weights: {idol: STRONG, genki: WEAK}
      - label: "A shut-in who stays in her room"
        i18n: {ja: {label: "自室に籠る内向き"}}
        weights: {hikikomori: STRONG, dandere: WEAK}

  # 5. 趣味 (hobby 軸)
  - id: hobby
    prompt: "Which hobby / lifestyle fits best?"
    i18n: {ja: {prompt: "趣味・ライフスタイルで近いのは？"}}
    options:
      - label: "Engrossed in games"
        i18n: {ja: {label: "ゲームに没頭"}}
        weights: {gamer: STRONG, playful: WEAK}
      - label: "A world of books and knowledge"
        i18n: {ja: {label: "本と知識の世界"}}
        weights: {reading: STRONG, intellectual: WEAK}
      - label: "Playing music"
        i18n: {ja: {label: "音楽を奏でる"}}
        weights: {music: STRONG, mysterious: WEAK}
      - label: "Working up a sweat in sports"
        i18n: {ja: {label: "スポーツで汗を流す"}}
        weights: {sports: STRONG, hot_blooded: WEAK}
      - label: "Delighting people with cooking"
        i18n: {ja: {label: "料理で人を喜ばせる"}}
        weights: {cooking: STRONG, protective: WEAK}
      - label: "Precise and mechanical"
        i18n: {ja: {label: "精緻で機械的"}}
        weights: {robot_android: STRONG, third_person: MILD}

  # 6. 外見 (visual 軸、Batch 3 追加)
  - id: appearance
    prompt: "Which look / vibe fits best?"
    i18n: {ja: {prompt: "外見・雰囲気で近いのは？"}}
    options:
      - label: "Intelligence behind glasses"
        i18n: {ja: {label: "眼鏡の奥に知性を感じさせる"}}
        weights: {glasses: STRONG, intellectual: WEAK}
      - label: "Mysterious with silver or white hair"
        i18n: {ja: {label: "銀髪・白髪で神秘的"}}
        weights: {silver_hair: STRONG, mysterious: WEAK}
      - label: "Delicate, makes you want to protect her"
        i18n: {ja: {label: "華奢で守ってあげたくなる"}}
        weights: {petite: STRONG, dandere: WEAK}
      - label: "A striking figure with presence"
        i18n: {ja: {label: "スタイル抜群で存在感"}}
        weights: {glamorous: STRONG, serious: WEAK}
      - label: "Otherworldly with animal ears and tail"
        i18n: {ja: {label: "獣耳・尻尾で非日常感"}}
        weights: {animal_ears: STRONG, playful: WEAK}

  # 7. ライフスタイル (personality / hobby クロス)
  - id: lifestyle
    prompt: "How does she spend her days?"
    i18n: {ja: {prompt: "日常の過ごし方は？"}}
    options:
      - label: "Clumsy and prone to blunders"
        i18n: {ja: {label: "不器用でドジが多い"}}
        weights: {klutz: STRONG, airhead: WEAK}
      - label: "Protective and caring"
        i18n: {ja: {label: "守りたがり・世話焼き"}}
        weights: {protective: STRONG, cooking: WEAK}
      - label: "Strong sense of justice, hot-blooded"
        i18n: {ja: {label: "正義感が強く熱血"}}
        weights: {hot_blooded: STRONG, sports: WEAK}
      - label: "Prioritizes efficiency and reason"
        i18n: {ja: {label: "効率・合理性を優先"}}
        weights: {pragmatist: STRONG, intellectual: WEAK}
      - label: "Bright and active"
        i18n: {ja: {label: "明るくアクティブ"}}
        weights: {genki: STRONG, sports: WEAK}

  # 8. 対人スタイル (personality + speech クロス)
  - id: interaction
    prompt: "How does she interact with people?"
    i18n: {ja: {prompt: "人と接するときは？"}}
    options:
      - label: "Teasing and provocative"
        i18n: {ja: {label: "からかい・挑発がち"}}
        weights: {mischievous: STRONG, playful: WEAK}
      - label: "Joking to lighten the mood"
        i18n: {ja: {label: "ふざけて場を和ませる"}}
        weights: {playful: STRONG, genki: WEAK}
      - label: "Quietly watches over"
        i18n: {ja: {label: "静かに見守る"}}
        weights: {dandere: STRONG, stoic: WEAK}
      - label: "Mechanical and matter-of-fact"
        i18n: {ja: {label: "機械的に淡々と"}}
        weights: {third_person: STRONG, robot_android: WEAK}
      - label: "Old-fashioned and formal"
        i18n: {ja: {label: "古風・格式高く"}}
        weights: {archaic: STRONG, keigo: WEAK}

  # 9. 文化的背景 (speech + personality)
  - id: cultural
    prompt: "What cultural / intellectual background?"
    i18n: {ja: {prompt: "文化的・知的なバックグラウンドは？"}}
    options:
      - label: "Erudite and analytical"
        i18n: {ja: {label: "博識で分析的"}}
        weights: {intellectual: STRONG, reading: WEAK}
      - label: "Rooted in Kyoto culture"
        i18n: {ja: {label: "京都の文化が根付く"}}
        weights: {kyoto_ben: STRONG, onee_kotoba: WEAK}
      - label: "Wandered across several regions"
        i18n: {ja: {label: "複数の地方を渡り歩いた"}}
        weights: {mixed_dialect: STRONG, dandere: WEAK}
      - label: "Sacred and traditional"
        i18n: {ja: {label: "神聖・伝統的"}}
        weights: {shrine_maiden: STRONG, archaic: WEAK}
      - label: "Modern and urban"
        i18n: {ja: {label: "現代・都会的"}}
        weights: {glamorous: WEAK, serious: WEAK, onee_kotoba: WEAK}
